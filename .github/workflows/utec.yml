name: Deploy to Google Cloud Run - Service Account Key (Multi-User)

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: "utec-posgrado-01"
  GCP_REGION: "us-central1"
  ARTIFACT_REGISTRY_REPO: "app-gemini" 

jobs:
  # 1. JOB DE CONSTRUCCIÓN Y DESPLIEGUE INICIAL / CANARY (10%)
  build_and_canary:
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    outputs:
      is_first_deploy: ${{ steps.check_service.outputs.is_first_deploy }}
      canary_revision: ${{ steps.deploy_canary.outputs.canary_revision }}
      service_name: ${{ steps.vars.outputs.service_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (JSON Key)
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Define Variables
        id: vars
        run: |
          echo "service_name=gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/app-${{ secrets.ALUMNO_ID }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Check if Service Exists
        id: check_service
        run: |
          if gcloud run services describe ${{ steps.vars.outputs.service_name }} --region ${{ env.GCP_REGION }} >/dev/null 2>&1; then
            echo "is_first_deploy=false" >> $GITHUB_OUTPUT
            echo "El servicio ya existe. Procediendo con Canary (10%)."
          else
            echo "is_first_deploy=true" >> $GITHUB_OUTPUT
            echo "Primera vez que se despliega el servicio. Se enviará el 100% del tráfico."
          fi

      - name: Build and Push Image
        run: |
          docker build -t ${{ steps.vars.outputs.image_tag }} .
          docker push ${{ steps.vars.outputs.image_tag }}

      - name: Deploy Canary (10% traffic) or Full Deploy (100%)
        id: deploy_canary
        run: |
          if [ "${{ steps.check_service.outputs.is_first_deploy }}" = "true" ]; then
            # Primera vez: Despliegue normal al 100%
            gcloud run deploy ${{ steps.vars.outputs.service_name }} \
              --image ${{ steps.vars.outputs.image_tag }} \
              --region ${{ env.GCP_REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --set-env-vars="ENVIRONMENT_NAME=${{ secrets.ENVIRONMENT_NAME }}"
          else
            # Siguientes veces: Desplegar nueva revisión sin asignarle tráfico inmediato
            gcloud run deploy ${{ secrets.vars.outputs.service_name }} \
              --image ${{ steps.vars.outputs.image_tag }} \
              --region ${{ env.GCP_REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --no-traffic \
              --set-env-vars="ENVIRONMENT_NAME=${{ secrets.ENVIRONMENT_NAME }}"
            
            # Capturar el nombre de la nueva revisión (Canary)
            CANARY_REV=$(gcloud run services describe ${{ steps.vars.outputs.service_name }} --region ${{ env.GCP_REGION }} --format="value(status.latestReadyRevisionName)")
            echo "canary_revision=$CANARY_REV" >> $GITHUB_OUTPUT
            
            # SOLUCIÓN AQUÍ: Forzamos la matemática perfecta (90% a la actual estable y 10% a la nueva Canary)
            gcloud run services update-traffic ${{ steps.vars.outputs.service_name }} \
              --region ${{ env.GCP_REGION }} \
              --to-revisions=LATEST=90,$CANARY_REV=10
          fi

  # 2. JOB DE APROBACIÓN MANUAL
  promote_or_rollback:
    needs: build_and_canary
    if: needs.build_and_canary.outputs.is_first_deploy == 'false'
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Promote Canary to 100% Traffic
        run: |
          echo "Promoviendo la revisión ${{ needs.build_and_canary.outputs.canary_revision }} al 100% de tráfico."
          gcloud run services update-traffic ${{ needs.build_and_canary.outputs.service_name }} \
            --region ${{ env.GCP_REGION }} \
            --to-revisions=${{ needs.build_and_canary.outputs.canary_revision }}=100

  # 3. JOB AUTOMÁTICO EN CASO DE RECHAZO O FALLO (ROLLBACK)
  rollback_canary:
    needs: [build_and_canary, promote_or_rollback]
    if: always() && needs.build_and_canary.outputs.is_first_deploy == 'false' && (needs.promote_or_rollback.result == 'denied' || needs.promote_or_rollback.result == 'failed')
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Rollback Traffic (Remove Canary)
        run: |
          echo "El despliegue fue rechazado o falló. Revirtiendo el 100% del tráfico..."
          gcloud run services update-traffic ${{ needs.build_and_canary.outputs.service_name }} \
            --region ${{ env.GCP_REGION }} \
            --to-latest-revision